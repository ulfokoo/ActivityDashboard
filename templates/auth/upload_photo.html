{% extends "base.html" %}
{% block title %}Update Profile Photo{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<h1>Update Profile Photo</h1>

<form method="post" enctype="multipart/form-data" style="max-width:400px;" id="photoForm">
  {{ form.hidden_tag() }}
  <div style="margin-bottom:16px;">
    {{ form.photo.label }}
    {{ form.photo(id="photoInput") }}
  </div>
  <div id="previewWrap" style="display:none; margin-bottom:16px;">
    <p style="font-size:0.85em; color:#52606d; margin-bottom:8px;">Preview (cropped):</p>
    <img id="previewImg" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid #dfe3e8;">
  </div>
  {{ form.submit(class="btn") }}
</form>

<!-- Crop Modal -->
<div id="cropModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:12px; padding:20px; max-width:500px; width:90%;">
    <h3 style="margin-top:0;">Crop your photo</h3>
    <div style="max-height:400px; overflow:hidden;">
      <img id="cropImage" style="max-width:100%; display:block;">
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
      <button type="button" class="btn btn-secondary" id="cropCancelBtn">Cancel</button>
      <button type="button" class="btn" id="cropConfirmBtn">Crop &amp; Save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const photoInput = document.getElementById('photoInput');
  const cropModal = document.getElementById('cropModal');
  const cropImage = document.getElementById('cropImage');
  const cropCancelBtn = document.getElementById('cropCancelBtn');
  const cropConfirmBtn = document.getElementById('cropConfirmBtn');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');

  let cropper = null;
  let originalFileName = 'profile.jpg';

  photoInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    originalFileName = file.name || 'profile.jpg';
    const reader = new FileReader();
    reader.onload = function(evt) {
      cropImage.src = evt.target.result;
      cropModal.style.display = 'flex';

      if (cropper) { cropper.destroy(); }
      cropper = new Cropper(cropImage, {
        aspectRatio: 1,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.9,
        background: false,
      });
    };
    reader.readAsDataURL(file);
  });

  cropCancelBtn.addEventListener('click', function() {
    if (cropper) { cropper.destroy(); cropper = null; }
    cropModal.style.display = 'none';
    photoInput.value = '';
    previewWrap.style.display = 'none';
  });

  cropConfirmBtn.addEventListener('click', function() {
    if (!cropper) return;
    const canvas = cropper.getCroppedCanvas({
      width: 400,
      height: 400,
      imageSmoothingQuality: 'high',
    });

    canvas.toBlob(function(blob) {
      const croppedFile = new File([blob], originalFileName, { type: 'image/jpeg' });
      const dt = new DataTransfer();
      dt.items.add(croppedFile);
      photoInput.files = dt.files;

      previewImg.src = URL.createObjectURL(blob);
      previewWrap.style.display = 'block';

      cropper.destroy();
      cropper = null;
      cropModal.style.display = 'none';
    }, 'image/jpeg', 0.9);
  });
});
</script>
{% endblock %}
